# org-analyser runtime config. Copy to config.yml (gitignored, never
# committed) and edit. Every value below is a default only -- the matching
# CLI flag always wins. With a target + tokens filled in, `org-analyser`
# runs with zero flags.
#
# After editing, run `org-analyser check` to validate tokens/tools/quota
# before a real run.

# --- credentials: fill in only the platform(s) you use ---
tokens:
  github-data-token: null   # repo-scope PAT -- for --github-org / --github-repo
  gitlab_token: null        # read_api PAT -- for --gitlab-group / --gitlab-project
  bitbucket_token: null     # workspace/repo access token; optional for a public repo
  bitbucket_username: null  # only for Bitbucket app-password auth
  openai_key: null          # or set OPENAI_API_KEY / AZURE_OPENAI_* in the environment
  gemini_key: null          # only if pr_rubrics_provider: gemini below

# --- run target: set exactly one (or pass the matching CLI flag instead) ---
github_org: null
github_repo: []              # ["your-org/repo-a", "your-org/repo-b"]
gitlab_group: null
gitlab_project: []           # ["your-group/repo-a"]
bitbucket_workspace: null
bitbucket_repo: []           # ["your-team/repo-a"]
local_repos_dir: null

# --- output ---
output_dir: outputs/org-analyser-runs
retention_days: 90           # run bundles hold contributor data; 0 disables cleanup

# --- performance ---
workers: 10                  # parallel repos
retries: 3                   # retries per repo per phase
clone_depth: 0                # 0 = full clone
skip_quality_score: false    # skip the sealed repo-quality-score phase
skip_f2p: false               # skip eval-kit's test verification (slow on large repos)

# --- advanced (rarely needed) ---
python: null                  # interpreter for subprocess phases; null = auto-detect venv
tokens_file: null              # key=value file instead of the tokens: map above
repos_manifest: null            # folder_name -> owner/repo map, for --local-repos-dir + PR data
github_host: github.com
gitlab_host: gitlab.com
github_token_name: github-data-token
pr_rubrics_provider: openai   # or "gemini" (needs gemini_key above)
local_only: false             # never contact a remote API, even if a checkout has 'origin'
local_batch_name: local       # label for --local-repos-dir runs
